services:
  specs-api:
    image: nginx:alpine
    container_name: specs-api
    ports:
      - "443:443"
    volumes:
      - /opt/abacus-appliance/specs:/usr/share/nginx/html:ro
      - /opt/abacus-appliance/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/abacus-appliance/certs:/etc/nginx/certs:ro
    restart: unless-stopped
