#cloud-config
autoinstall:
  version: 1
  locale: en_US.UTF-8
  keyboard:
    layout: us

  identity:
    hostname: lerix-llm
    username: lerix
    password: "$6$tSX3J8Oo4ZILqRCW$OS8ZR2.AZDi/AkbNmkc3VvJ0oith1zZ7eHetPR8oukUNtCdFpFi9814Kl2VJrZB5bUzwbKZedfrikDYhl1CAX0"

  ssh:
    install-server: true
    allow-pw: true

  packages:
    - docker.io
    - pciutils
    - ubuntu-drivers-common
    - util-linux
    - avahi-daemon
    - libnss-mdns
    - openssl

  storage:
    layout:
      name: direct

  late-commands:
    - mkdir -p /target/opt/abacus-appliance
    - cp -a /cdrom/nocloud/os /target/opt/abacus-appliance/os
    - chmod 0755 /target/opt/abacus-appliance/os/install/post-install.sh
    - curtin in-target -- bash -lc 'set -eux; /opt/abacus-appliance/os/install/post-install.sh'

  shutdown: reboot
